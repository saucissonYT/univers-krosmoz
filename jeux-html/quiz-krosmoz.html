<main class="quiz-main">
  <a class="back-link" href="jeux.html">Retour aux jeux</a>

  <section class="quiz-setup" data-quiz-setup aria-labelledby="quiz-title">
    <div class="quiz-setup-copy">
      <p class="quiz-kicker" id="quiz-title">Quiz ultime d'Écaflip</p>
      <div class="quiz-selection-summary" data-selection-summary aria-live="polite"></div>
    </div>

    <form class="quiz-options" data-quiz-form>
      <fieldset>
        <legend>Nombre de questions</legend>
        <div class="segmented-control">
          <label><input type="radio" name="questionCount" value="10" checked><span>10</span></label>
          <label><input type="radio" name="questionCount" value="20"><span>20</span></label>
          <label><input type="radio" name="questionCount" value="30"><span>30</span></label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Difficulté</legend>
        <div class="segmented-control">
          <label><input type="radio" name="difficulty" value="all" checked><span>Mélange</span></label>
          <label><input type="radio" name="difficulty" value="facile"><span>Facile</span></label>
          <label><input type="radio" name="difficulty" value="moyen"><span>Moyen</span></label>
          <label><input type="radio" name="difficulty" value="difficile"><span>Difficile</span></label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Thèmes</legend>
        <div class="category-grid" data-category-options></div>
      </fieldset>

      <p class="quiz-count" data-bank-count></p>
      <button class="primary-action" type="submit">Lancer le quiz</button>
    </form>
  </section>

  <section class="quiz-play" data-quiz-play hidden aria-live="polite">
    <div class="quiz-status">
      <div>
        <p class="quiz-kicker" data-question-meta></p>
        <h2 data-question-title></h2>
      </div>
      <div class="score-pill" data-score-pill>0 / 0</div>
    </div>
    <div class="progress-track" aria-hidden="true"><span data-progress-bar></span></div>
    <div class="answer-list" data-answer-list></div>
    <div class="feedback-box" data-feedback hidden>
      <strong data-feedback-title></strong>
      <p data-feedback-text></p>
    </div>
    <div class="quiz-actions">
      <button class="secondary-action" type="button" data-stop-quiz>Quitter</button>
      <button class="primary-action" type="button" data-next-question disabled>Question suivante</button>
    </div>
  </section>

</main>

<div class="quiz-result-modal" data-quiz-result hidden>
  <div class="quiz-result-backdrop" data-close-quiz-result></div>
  <section class="quiz-result quiz-result-panel" role="dialog" aria-modal="true" aria-labelledby="quiz-result-title">
    <button class="quiz-result-close" type="button" data-close-quiz-result aria-label="Fermer le résultat">×</button>
    <p class="quiz-kicker">Résultat</p>
    <h2 id="quiz-result-title" data-result-title></h2>
    <p data-result-copy></p>
    <div class="result-score" data-result-score></div>
    <div class="result-breakdown" data-result-breakdown></div>
    <div class="quiz-actions">
      <button class="secondary-action" type="button" data-return-quiz-setup>Retour au choix du quiz</button>
      <button class="primary-action" type="button" data-replay-quiz>Rejouer</button>
      <button class="primary-action" type="button" data-open-result-card>Partager le résultat</button>
    </div>
  </section>
</div>

<div class="quiz-share-modal" data-result-modal hidden>
  <div class="quiz-share-backdrop" data-close-result-card></div>
  <section class="quiz-share-panel" role="dialog" aria-modal="true" aria-labelledby="quiz-share-title">
    <button class="quiz-share-close" type="button" data-close-result-card aria-label="Fermer">x</button>
    <p class="quiz-kicker">Fiche de résultat</p>
    <h2 id="quiz-share-title">Partager mon score</h2>
    <div class="quiz-share-card" data-result-card>
      <span>Quiz ultime d'Écaflip</span>
      <strong data-card-title></strong>
      <em data-card-score></em>
      <p data-card-copy></p>
    </div>
    <div class="quiz-share-actions">
      <button type="button" data-copy-result>Copier le résultat</button>
      <button type="button" data-download-result>Télécharger l'image</button>
    </div>
    <p class="quiz-share-note" data-card-status aria-live="polite"></p>
  </section>
</div>
