<script src="../scripts/chronologie-oeuvres.js?v=restore-chronologies"></script>
<script>
  const backToTop = document.querySelector('.back-to-top');

  if (backToTop) {
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('is-visible', window.scrollY > 520);
    }, { passive: true });

    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  document.querySelectorAll('.chronology-switch').forEach((link) => {
    link.addEventListener('click', (event) => {
      if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey || event.button !== 0) {
        return;
      }

      event.preventDefault();
      link.classList.add('is-switching');
      const cube = link.querySelector('.chronology-switch-cube img');
      if (cube?.dataset.transitionSrc) {
        const transitionCube = cube.cloneNode(false);
        transitionCube.className = 'chronology-switch-transition';
        transitionCube.removeAttribute('data-transition-src');
        transitionCube.src = `${cube.dataset.transitionSrc}?v=${Date.now()}`;
        cube.parentElement.appendChild(transitionCube);
        requestAnimationFrame(() => {
          transitionCube.classList.add('is-visible');
          cube.classList.add('is-fading-out');
        });
      }
      window.setTimeout(() => {
        window.location.href = link.href;
      }, 980);
    });
  });
</script>
