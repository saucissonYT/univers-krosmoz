<link rel="icon" type="image/webp" href="assets/Krosmoz_1.webp">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/carte-interactive.css?v=20260502-hd">
</head>
<body>
<!-- Header partage avec les autres pages pour garder les liens de navigation au meme endroit. -->
<!-- Header commun : logo du site + liens principaux. -->
<header>
  <div class="site-topbar">
    <a class="brand" href="index.html" aria-label="Univers Krosmoz">
      <img src="assets/logo_krosmoz.webp" alt="">
      <span>Univers Krosmoz</span>
    </a>
    <!-- Navigation principale : memes entrees sur toutes les pages pour rester coherent. -->
    <nav class="top-nav" aria-label="Navigation principale">
      <a class="nav-link" href="personnages.html">Personnages</a>
      <a class="nav-link" href="chronologies.html">Chronologie</a>
      <a class="nav-link active" href="cartes.html">Cartes</a>
      <div class="nav-item nav-dropdown">
        <button class="nav-link" type="button">M&eacute;dias <span class="nav-caret">&#9662;</span></button>
        <div class="nav-menu">
          <a class="nav-menu-item" href="https://www.allskreen.com/webtoon" target="_blank" rel="noopener noreferrer">Allskreen</a>
          <a class="nav-menu-item" href="https://www.ankama.com/fr/launcher" target="_blank" rel="noopener noreferrer">Ankama Launcher</a>
          <a class="nav-menu-item" href="https://www.youtube.com/channel/UCBnR9AVNjPflxPSt6dz4ATw?view_as=subscriber" target="_blank" rel="noopener noreferrer">Vid&eacute;os Krosmoz</a>
          <a class="nav-menu-item" href="https://www.france.tv/france-3/wakfu/saison-4/" target="_blank" rel="noopener noreferrer">Wakfu saison 4</a>
        </div>
      </div>
    </nav>
  </div>
</header>

<!-- Contenu principal : chaque page met sa partie importante ici. -->
<main>
  <!-- Zone de carte : le JS place les points cliquables par-dessus l image. -->
  <!-- La carte est rendue comme une image plein ecran. Le JS ajoute ensuite les boutons de zones par-dessus. -->
  <section class="map-section">
    <div class="map-stage">
      <div class="map-loading" id="map-loading" role="status" aria-live="polite">
        <span>Chargement de la carte</span>
      </div>
      <div class="map-viewport" id="map-viewport">
        <div class="map-frame">
          <div class="map-canvas" id="map-canvas">
            <div class="map-artwork">
              <img class="map-base" src="assets/carte interactive/wakfu_world_map.png" alt="Carte du Monde des Douze" loading="eager" draggable="false">
              <!-- Couche vide remplie par scripts/carte-interactive.js avec les hotspots cliquables. -->
              <div class="map-hotspots" id="map-hotspots"></div>
            </div>
          </div>
        </div>
      </div>
      <!-- Boutons de zoom lies aux handlers JS; la molette et le pinch sont geres sur le viewport. -->
      <div class="map-controls" aria-label="Contrôles de carte">
        <button class="map-control" id="zoom-out" type="button" aria-label="Zoom arrière">−</button>
        <button class="map-control" id="zoom-reset" type="button" aria-label="Réinitialiser la vue">⟳</button>
        <button class="map-control" id="zoom-in" type="button" aria-label="Zoom avant">+</button>
      </div>
    </div>
  </section>
</main>

<!-- Signature projet : site developpe par phomsay pour zaki. Contact Discord : @phomsay671. Dev web : phomsay. Admin : sauci. Travail de recherche et edition : Zaki & B. Ne pas supprimer la signature pour les prochains devs qui travaillent sur le projet. -->

<!-- Panneau de details reutilise par toutes les zones de la carte. Son contenu est injecte au clic. -->
<aside class="slide-panel" id="slide-panel" aria-hidden="true">
  <div class="slide-panel-inner">
    <button class="slide-panel-close" id="slide-panel-close" aria-label="Fermer">✕</button>
    <div class="slide-panel-img-wrap" id="slide-panel-img-wrap">
      <img class="slide-panel-img" id="slide-panel-img" src="" alt="">
    </div>
    <div class="slide-panel-body">
      <h2 class="slide-panel-title" id="slide-panel-title"></h2>
      <p class="slide-panel-text" id="slide-panel-text"></p>
    </div>
  </div>
</aside>

<script src="scripts/carte-interactive.js?v=20260502-hd"></script>
</body>
</html>
