<!-- Petit script maison pour filtrer les personnages avec la barre de recherche. -->
<script>
  const characterSearch = document.querySelector('#character-search');
  const characterCards = Array.from(document.querySelectorAll('.character-card'));

  characterSearch.addEventListener('input', () => {
    const query = characterSearch.value.trim().toLowerCase();
    characterCards.forEach((card) => {
      card.hidden = query && !card.dataset.character.includes(query);
    });
  });
</script>
