<body>
<header data-site-header></header>

<main class="contact-main">
  <section class="contact-hero" aria-labelledby="contact-title">
    <p class="contact-eyebrow">Univers Krosmoz</p>
    <h1 id="contact-title">Contactez-nous</h1>
    <div class="contact-rule" aria-hidden="true"></div>
  </section>

  <section class="contact-layout" aria-label="Formulaire de contact">
    <form class="contact-form" action="/api/contact" method="post" data-contact-form>
      <div class="contact-field">
        <label for="contact-name">Nom ou pseudo</label>
        <input id="contact-name" name="name" type="text" autocomplete="name" required>
      </div>
      <div class="contact-field">
        <label for="contact-subject">Sujet</label>
        <select class="contact-native-select" id="contact-subject" name="subject" required tabindex="-1" aria-hidden="true">
          <option value="">Choisir un sujet</option>
          <option>Correction de contenu</option>
          <option>Ajout de personnage</option>
          <option>Problème technique</option>
          <option>Suggestion</option>
          <option>Autre demande</option>
        </select>
        <div class="contact-select" data-contact-select>
          <button class="contact-select-toggle" type="button" aria-haspopup="true" aria-expanded="false">
            <span data-contact-select-label>Choisir un sujet</span>
            <span class="nav-caret" aria-hidden="true">▾</span>
          </button>
          <div class="contact-select-menu" role="menu">
            <button class="contact-select-item active" type="button" data-value="" role="menuitem">Choisir un sujet</button>
            <button class="contact-select-item" type="button" data-value="Correction de contenu" role="menuitem">Correction de contenu</button>
            <button class="contact-select-item" type="button" data-value="Ajout de personnage" role="menuitem">Ajout de personnage</button>
            <button class="contact-select-item" type="button" data-value="Problème technique" role="menuitem">Problème technique</button>
            <button class="contact-select-item" type="button" data-value="Suggestion" role="menuitem">Suggestion</button>
            <button class="contact-select-item" type="button" data-value="Autre demande" role="menuitem">Autre demande</button>
          </div>
        </div>
      </div>
      <div class="contact-field">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" rows="8" minlength="10" maxlength="4000" required></textarea>
      </div>
      <p class="contact-privacy">Le message est envoyé directement à l'administration du site. Il n'est pas publié sur le site.</p>
      <button class="contact-submit" type="submit">Envoyer le message</button>
      <p class="contact-status" data-contact-status role="status" aria-live="polite"></p>
    </form>

    <aside class="contact-panel" aria-label="Informations de contact">
      <h2>Transmission privée</h2>
      <p><em>Les messages envoyés via ce formulaire sont destinés uniquement à l’administration d’Univers Krosmoz.</em></p>
      <div class="contact-panel-line"></div>
      <p class="contact-mail">universkrosmoz@gmail.com</p>
    </aside>
  </section>
</main>
