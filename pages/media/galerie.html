<body class="gallery-page">
<header data-site-header></header>

<main class="gallery-main">
  <section class="gallery-hero" aria-labelledby="gallery-title">
    <div class="gallery-hero-copy">
      <p class="gallery-kicker">Autres</p>
      <h1 id="gallery-title">Galerie</h1>
      <p>Les bannières de personnages utilisées sur le site, réunies au même endroit et disponibles au téléchargement.</p>
    </div>
    <div class="gallery-tools" role="search">
      <label class="gallery-search-label" for="gallery-search">Rechercher une image</label>
      <input id="gallery-search" class="gallery-search" type="search" placeholder="Nom du personnage" autocomplete="off">
      <p class="gallery-count" aria-live="polite"><span data-gallery-count>0</span> images</p>
    </div>
  </section>

  <section class="gallery-section" aria-label="Bannieres de personnages">
    <div class="gallery-grid" data-gallery-grid></div>
    <p class="gallery-empty" data-gallery-empty hidden>Aucune image ne correspond à cette recherche.</p>
  </section>
</main>

<div class="gallery-modal" data-gallery-modal hidden>
  <div class="gallery-modal-backdrop" data-gallery-close></div>
  <section class="gallery-modal-panel" role="dialog" aria-modal="true" aria-labelledby="gallery-modal-title">
    <button class="gallery-modal-close" type="button" data-gallery-close aria-label="Fermer l'image">
      <span aria-hidden="true">×</span>
    </button>
    <div class="gallery-modal-media">
      <img data-gallery-modal-image alt="" decoding="async">
    </div>
    <div class="gallery-modal-content">
      <a id="gallery-modal-title" class="gallery-modal-title" data-gallery-modal-title data-gallery-modal-profile href="#">Image</a>
    </div>
  </section>
</div>

<button class="back-to-top" type="button" aria-label="Revenir en haut de la page" title="Revenir en haut">
  <span aria-hidden="true">↑</span>
</button>

<script src="../../scripts/legal-notice.js"></script>
<script src="../../data/gallery/bannieres.js"></script>
<script src="../../scripts/galerie.js"></script>
